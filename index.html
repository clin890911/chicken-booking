<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#e60012" />
    <!-- 管理連結帶 ?token=，避免跨來源 Referer 外洩 token（只送 origin、不送路徑/query）。 -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <title>雞王涮涮鍋｜線上訂位</title>

    <!-- SEO -->
    <meta name="description" content="雞王涮涮鍋線上訂位系統。南投縣鹿谷鄉人氣火鍋，線上即時查詢空位、預約座位、修改與查詢訂位，方便快速。" />
    <meta name="keywords" content="雞王涮涮鍋,鹿谷火鍋,南投訂位,線上訂位,火鍋訂位,雞肉火鍋" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph（分享到 LINE / Facebook 顯示預覽卡） -->
    <meta property="og:type" content="restaurant.restaurant" />
    <meta property="og:site_name" content="雞王涮涮鍋" />
    <meta property="og:title" content="雞王涮涮鍋｜線上訂位" />
    <meta property="og:description" content="南投縣鹿谷鄉人氣火鍋。線上即時查詢空位、預約座位，方便又快速。" />
    <meta property="og:image" content="/brand/master-of-chicken-logo.jpg" />
    <meta property="og:locale" content="zh_TW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="雞王涮涮鍋｜線上訂位" />
    <meta name="twitter:description" content="南投縣鹿谷鄉人氣火鍋。線上即時查詢空位、預約座位，方便又快速。" />
    <meta name="twitter:image" content="/brand/master-of-chicken-logo.jpg" />

    <!-- schema.org 結構化資料（餐廳 + 可訂位） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "雞王涮涮鍋",
      "servesCuisine": "火鍋",
      "acceptsReservations": "True",
      "telephone": "+886-49-2753377",
      "image": "/brand/master-of-chicken-logo.jpg",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "中正路二段377號",
        "addressLocality": "鹿谷鄉",
        "addressRegion": "南投縣",
        "addressCountry": "TW"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "23.7523874",
        "longitude": "120.746746"
      },
      "openingHours": "Mo-Su 11:00-19:00"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
